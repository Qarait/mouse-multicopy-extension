<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mouse MultiCopy Test Harness</title>
    <link rel="stylesheet" href="content.css">
    <style>
      body {
        max-width: 760px;
        margin: 40px auto;
        padding: 0 18px 120px;
        color: #172033;
        font-family: Arial, sans-serif;
        line-height: 1.55;
      }

      h1 {
        font-size: 28px;
      }

      .sample {
        padding: 18px;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        background: #fff;
      }

      textarea,
      [contenteditable="true"] {
        display: block;
        width: 100%;
        min-height: 110px;
        margin-top: 18px;
        padding: 12px;
        border: 1px solid #9ca3af;
        border-radius: 8px;
        font: inherit;
      }
    </style>
  </head>
  <body>
    <h1>Mouse MultiCopy Test Harness</h1>
    <p class="sample">
      Alpha selection is the first test phrase. Beta selection is the second test phrase.
      Gamma selection is the third test phrase.
    </p>
    <textarea id="target" placeholder="Paste a slot here"></textarea>
    <div id="editable" contenteditable="true">Editable target</div>

    <script>
      (() => {
        const listeners = [];
        let state = {};

        window.chrome = {
          runtime: {
            onMessage: {
              addListener(listener) {
                listeners.push(listener);
              }
            }
          },
          storage: {
            onChanged: {
              addListener(listener) {
                listeners.push(listener);
              }
            },
            local: {
              async get(key) {
                return { [key]: state[key] };
              },
              async set(next) {
                const previous = { ...state };
                state = { ...state, ...next };
                for (const key of Object.keys(next)) {
                  const change = {
                    [key]: {
                      oldValue: previous[key],
                      newValue: next[key]
                    }
                  };
                  for (const listener of listeners) {
                    listener(change, "local", () => {});
                  }
                }
              }
            }
          }
        };

        window.__mmcTest = {
          getState() {
            return state.mouseMultiCopyState;
          }
        };
      })();
    </script>
    <script src="content.js"></script>
  </body>
</html>
