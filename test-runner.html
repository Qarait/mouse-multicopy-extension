<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Mouse MultiCopy Automated Test</title>
    <link rel="stylesheet" href="content.css">
  </head>
  <body data-test-status="running">
    <p id="sample">
      Alpha selection is the first test phrase. Beta selection is the second test phrase.
      Gamma selection is the third test phrase. Delta selection is the fourth test phrase.
    </p>
    <textarea id="target"></textarea>
    <div class="cm-editor">
      <div id="codeTarget" contenteditable="true"></div>
    </div>
    <pre id="result">running</pre>

    <script>
      (() => {
        const runtimeListeners = [];
        const storageListeners = [];
        let state = {};

        window.chrome = {
          runtime: {
            onMessage: {
              addListener(listener) {
                runtimeListeners.push(listener);
              }
            }
          },
          storage: {
            onChanged: {
              addListener(listener) {
                storageListeners.push(listener);
              }
            },
            local: {
              async get(key) {
                return { [key]: state[key] };
              },
              async set(next) {
                const previous = { ...state };
                state = { ...state, ...next };
                for (const key of Object.keys(next)) {
                  const change = {
                    [key]: {
                      oldValue: previous[key],
                      newValue: next[key]
                    }
                  };
                  for (const listener of storageListeners) {
                    listener(change, "local");
                  }
                }
              }
            }
          }
        };

        window.__mmcTest = {
          clipboardText: "",
          getState() {
            return state.mouseMultiCopyState;
          },
          getClipboardText() {
            return this.clipboardText;
          },
          send(message) {
            return new Promise((resolve) => {
              const listener = runtimeListeners[0];
              listener(message, {}, resolve);
            });
          }
        };

        Object.defineProperty(navigator, "clipboard", {
          configurable: true,
          value: {
            async writeText(text) {
              window.__mmcTest.clipboardText = text;
            }
          }
        });
      })();
    </script>
    <script src="state.js"></script>
    <script src="clipboard.js"></script>
    <script src="content.js"></script>
    <script>
      const wait = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

      function selectPhrase(phrase) {
        const sample = document.getElementById("sample");
        const walker = document.createTreeWalker(sample, NodeFilter.SHOW_TEXT);
        let node = walker.nextNode();

        while (node) {
          const index = node.textContent.indexOf(phrase);
          if (index >= 0) {
            const range = document.createRange();
            range.setStart(node, index);
            range.setEnd(node, index + phrase.length);
            const selection = window.getSelection();
            selection.removeAllRanges();
            selection.addRange(range);
            sample.dispatchEvent(new MouseEvent("mouseup", { bubbles: true }));
            return;
          }

          node = walker.nextNode();
        }

        throw new Error(`Phrase not found: ${phrase}`);
      }

      function dragHandle(handle, deltaX, deltaY, pointerId) {
        const bounds = handle.getBoundingClientRect();
        const startX = bounds.left + Math.min(20, bounds.width / 2);
        const startY = bounds.top + Math.min(20, bounds.height / 2);
        const eventOptions = {
          bubbles: true,
          cancelable: true,
          button: 0,
          buttons: 1,
          pointerId,
          pointerType: "mouse"
        };

        handle.dispatchEvent(new PointerEvent("pointerdown", {
          ...eventOptions,
          clientX: startX,
          clientY: startY
        }));
        handle.dispatchEvent(new PointerEvent("pointermove", {
          ...eventOptions,
          clientX: startX + deltaX,
          clientY: startY + deltaY
        }));
        handle.dispatchEvent(new PointerEvent("pointerup", {
          ...eventOptions,
          buttons: 0,
          clientX: startX + deltaX,
          clientY: startY + deltaY
        }));
      }

      async function run() {
        const result = document.getElementById("result");

        try {
          await wait(200);
          await chrome.storage.local.set({
            mouseMultiCopyState: {
              enabled: true,
              maxSlots: 3,
              minChars: 3,
              ignoreDuplicates: true,
              currentPage: "42",
              outputFormat: "numbered",
              includeSource: true,
              includePage: true,
              clips: []
            }
          });

          selectPhrase("is");
          await wait(250);

          if ((window.__mmcTest.getState()?.clips.length || 0) !== 0) {
            throw new Error("Expected short selection to be ignored.");
          }

          selectPhrase("Alpha selection");
          await wait(250);
          selectPhrase("Beta selection");
          await wait(250);
          selectPhrase("Gamma selection");
          await wait(350);

          selectPhrase("Beta selection");
          await wait(250);

          const state = window.__mmcTest.getState();
          const target = document.getElementById("target");

          if (!state || state.clips.length !== 3) {
            throw new Error(`Expected 3 clips, got ${state?.clips.length || 0}`);
          }
          if (state.clips.some((clip) => clip.page !== "42")) {
            throw new Error("Expected new captures to inherit the current page.");
          }
          if (
            document.getElementById("mmc-title").textContent !== "Highlights" ||
            document.getElementById("mmc-status").textContent !== "3 saved" ||
            document.querySelectorAll(".mmc-slot").length !== 3 ||
            document.querySelector(".mmc-empty") ||
            document.getElementById("mmc-copy-all").textContent !== "Copy All 3" ||
            document.getElementById("mmc-options").open
          ) {
            throw new Error("Expected the compact saved-highlights palette.");
          }
          const widget = document.getElementById("mmc-widget");
          const expandButton = document.getElementById("mmc-expand");
          const collapseButton = document.getElementById("mmc-collapse");
          expandButton.click();
          await wait(50);
          if (
            !widget.classList.contains("mmc-expanded") ||
            expandButton.getAttribute("aria-expanded") !== "true" ||
            expandButton.getAttribute("aria-label") !== "Contract highlights panel"
          ) {
            throw new Error("Expected the expand control to open the wider highlights view.");
          }
          expandButton.click();
          await wait(50);
          if (
            widget.classList.contains("mmc-expanded") ||
            expandButton.getAttribute("aria-expanded") !== "false"
          ) {
            throw new Error("Expected the expand control to contract the highlights view.");
          }
          collapseButton.click();
          await wait(50);
          if (widget.classList.contains("mmc-open")) {
            throw new Error("Expected close to collapse the panel without removing the MC button.");
          }

          const toggle = document.getElementById("mmc-toggle");
          dragHandle(toggle, -Math.round(window.innerWidth / 2), -Math.round(window.innerHeight / 2), 11);
          await wait(150);
          const collapsedPosition = window.__mmcTest.getState().widgetPosition;
          const collapsedBounds = widget.getBoundingClientRect();
          if (
            !collapsedPosition ||
            collapsedBounds.left < 8 ||
            collapsedBounds.top < 8 ||
            collapsedBounds.right > window.innerWidth - 8 ||
            collapsedBounds.bottom > window.innerHeight - 8
          ) {
            throw new Error("Expected the collapsed MC bar to move, persist, and remain inside the viewport.");
          }

          toggle.click();
          await wait(20);
          if (widget.classList.contains("mmc-open")) {
            throw new Error("Expected dragging the MC bar not to trigger its click action.");
          }
          toggle.click();
          await wait(50);
          if (!widget.classList.contains("mmc-open")) {
            throw new Error("Expected the MC button to reopen the collapsed panel.");
          }

          dragHandle(document.getElementById("mmc-header"), -window.innerWidth, -window.innerHeight, 12);
          await wait(150);
          const openPosition = window.__mmcTest.getState().widgetPosition;
          const openBounds = widget.getBoundingClientRect();
          if (
            openPosition?.x !== 8 ||
            openPosition?.y !== 8 ||
            Math.round(openBounds.left) !== 8 ||
            Math.round(openBounds.top) !== 8
          ) {
            throw new Error("Expected the open panel header to move the widget to the top-left and persist its position.");
          }

          const options = document.getElementById("mmc-options");
          options.open = true;
          options.dispatchEvent(new Event("toggle"));
          await wait(50);
          if (
            !widget.classList.contains("mmc-options-open") ||
            getComputedStyle(document.querySelector(".mmc-item-actions")).display !== "grid" ||
            document.querySelectorAll(".mmc-copy").length !== 3 ||
            document.querySelectorAll(".mmc-paste").length !== 3 ||
            document.querySelectorAll(".mmc-delete").length !== 3
          ) {
            throw new Error("Expected individual controls to appear under Options.");
          }
          options.open = false;
          options.dispatchEvent(new Event("toggle"));

          selectPhrase("Delta selection");
          await wait(250);

          const afterEviction = window.__mmcTest.getState();
          if (
            afterEviction.clips.length !== 3 ||
            afterEviction.clips[0].text !== "Beta selection" ||
            afterEviction.clips[2].text !== "Delta selection"
          ) {
            throw new Error("Expected slot eviction to replace the oldest clip.");
          }

          const toast = document.getElementById("mmc-toast-message").textContent;
          if (!toast.includes("Slot 1 was replaced")) {
            throw new Error(`Expected eviction warning toast, got: ${toast}`);
          }

          document.querySelectorAll(".mmc-copy")[1].click();
          await wait(120);

          if (
            window.__mmcTest.getClipboardText() !== "Gamma selection" ||
            window.__mmcTest.getState().clips.length !== 3
          ) {
            throw new Error("Expected individual Copy to preserve highlights and copy the chosen text.");
          }

          const slots = Array.from(document.querySelectorAll(".mmc-paste"));
          target.focus();
          slots[1].click();
          await wait(120);

          if (target.value !== "Gamma selection") {
            throw new Error(`Expected slot 2 paste, got: ${target.value}`);
          }

          await window.__mmcTest.send({ type: "pasteClip", index: 2 });
          await wait(120);

          if (target.value !== "Gamma selectionDelta selection") {
            throw new Error(`Expected slot 3 append, got: ${target.value}`);
          }

          const codeTarget = document.getElementById("codeTarget");
          codeTarget.focus();
          await window.__mmcTest.send({ type: "pasteClip", index: 0 });
          await wait(120);

          const fallbackToast = document.getElementById("mmc-toast-message").textContent;
          if (
            codeTarget.textContent !== "" ||
            window.__mmcTest.getClipboardText() !== "Beta selection" ||
            !fallbackToast.includes("Copied to clipboard instead")
          ) {
            throw new Error("Expected rich editor fallback to copy instead of direct DOM insertion.");
          }

          document.querySelectorAll(".mmc-delete")[0].click();
          await wait(120);

          const afterDelete = window.__mmcTest.getState();
          if (afterDelete.clips.length !== 2 || afterDelete.clips[0].text !== "Gamma selection") {
            throw new Error("Expected slot deletion to remove the first clip.");
          }

          await window.__mmcTest.send({ type: "renameClip", index: 0, label: "Issue" });
          await wait(120);

          const afterRename = window.__mmcTest.getState();
          if (afterRename.clips[0].label !== "Issue") {
            throw new Error("Expected slot label rename to persist.");
          }

          await window.__mmcTest.send({ type: "reorderClip", fromIndex: 1, toIndex: 0 });
          await wait(120);

          const afterReorder = window.__mmcTest.getState();
          if (afterReorder.clips[0].text !== "Delta selection" || afterReorder.clips[1].text !== "Gamma selection") {
            throw new Error("Expected slot reorder to persist.");
          }

          if (!afterReorder.groups || afterReorder.groups.length !== 1 || afterReorder.activeGroupId !== "default") {
            throw new Error("Expected legacy clips to migrate into the default group.");
          }

          document.getElementById("mmc-copy-all").click();
          await wait(120);

          const copiedAll = window.__mmcTest.getClipboardText();
          if (copiedAll !== "Delta selection\n\nGamma selection") {
            throw new Error(`Expected plain Copy All output, got: ${copiedAll}`);
          }

          options.open = true;
          options.dispatchEvent(new Event("toggle"));
          expandButton.click();
          await wait(180);
          const widgetBounds = widget.getBoundingClientRect();
          if (
            !widget.classList.contains("mmc-expanded") ||
            widgetBounds.left < 0 ||
            widgetBounds.right > window.innerWidth ||
            widget.scrollWidth > widget.clientWidth
          ) {
            throw new Error("Expected the expanded panel to remain within the viewport.");
          }

          result.textContent = JSON.stringify({
            status: "pass",
            clips: afterReorder.clips.map((clip) => clip.text),
            pasted: target.value,
            copiedAll,
            expanded: widget.classList.contains("mmc-expanded"),
            widgetPosition: window.__mmcTest.getState().widgetPosition,
            widgetWidth: Math.round(widgetBounds.width),
            viewportWidth: window.innerWidth
          });
          document.body.dataset.testStatus = "pass";
        } catch (error) {
          result.textContent = JSON.stringify({
            status: "fail",
            message: error.message
          });
          document.body.dataset.testStatus = "fail";
        }
      }

      window.addEventListener("load", run);
    </script>
  </body>
</html>
